<!-- A/B Splitter — asigna variante, registra evento, redirige -->
<!-- ============================================= -->
<script>
(function(){
  try {
    var VARIANT_KEY = 'reboot_ab_variant';
    var VARIANT_DATE_KEY = 'reboot_ab_assigned_at';

    // 1. Override por URL (?v=a o ?v=b) — para testing manual
    var urlParams = new URLSearchParams(window.location.search);
    var urlV = (urlParams.get('v') || '').toLowerCase();

    // 2. Ya pinneado en localStorage?
    var variant = null;
    try { variant = localStorage.getItem(VARIANT_KEY); } catch(e){}

    var isNewAssignment = false;
    if (urlV === 'a' || urlV === 'b') {
      variant = urlV.toUpperCase();
      try { localStorage.setItem(VARIANT_KEY, variant); localStorage.setItem(VARIANT_DATE_KEY, new Date().toISOString()); } catch(e){}
      isNewAssignment = true;
    } else if (!variant || (variant !== 'A' && variant !== 'B')) {
      // Coin flip 50/50
      variant = Math.random() < 0.5 ? 'A' : 'B';
      try { localStorage.setItem(VARIANT_KEY, variant); localStorage.setItem(VARIANT_DATE_KEY, new Date().toISOString()); } catch(e){}
      isNewAssignment = true;
    }

    // 3. Disparar evento a los 3 sistemas
    var params = { variant: variant, is_new_assignment: isNewAssignment };
    try { if (typeof fbq !== 'undefined') fbq('trackCustom', 'ab_test_assigned', params); } catch(e){}
    try { if (typeof gtag !== 'undefined') gtag('event', 'ab_test_assigned', params); } catch(e){}
    try { if (typeof clarity !== 'undefined') { clarity('set', 'ab_variant', variant); clarity('event', 'ab_test_assigned'); } } catch(e){}

    // 4. Construir URL destino preservando query params (UTMs, etc.)
    var target = (variant === 'B' ? 'programa-b.html' : 'programa-a.html');
    var qs = window.location.search || '';
    // Limpiar el ?v=... para que no se arrastre al variant
    if (qs) {
      var cleaned = new URLSearchParams(qs);
      cleaned.delete('v');
      qs = cleaned.toString();
      qs = qs ? ('?' + qs) : '';
    }
    target = target + qs + (window.location.hash || '');

    // 5. Redirigir (replace = no guarda programa.html en history)
    window.location.replace(target);

  } catch (err) {
    // Cualquier error → fallback a variant A
    window.location.replace('programa-a.html' + (window.location.search || '') + (window.location.hash || ''));
  }
})();
</script>
